# Training dataclass equivalent
run_name: "sandesc"
run_id: "0"
wandb_run_path: ""

# Mixed Precision
use_amp: True
amp_dtype: "bfloat16"

# Learning Rate
lr_scheduler: "warmup_decay_constant_old"
lr_min: 1e-4
lr_max: 5e-3
decay_steps: 100_000
warmup_steps: 2048

# Training
dataset: "disk" #"terrasky"
max_n_keypoints: 2048
max_iterations: 100000
batch_size: 12 # sandesc is 14
photo_aug_in_training: False
random_training_rotation: 30

# wrapper
validation_multiscale: False
train_wrapper: "aliked"
valid_wrapper: "superpoint"
wrapper_mismatch: 0.2

# Evaluation
eval: True
n_images_to_log: 5
n_images_stats: 50
evaluate_every_n_iterations: 1024
save_every_n_iterations: 64
ratio_test: 1.0
max_epipolar_error: 1.0